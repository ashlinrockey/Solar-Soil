name: solarsoil_dashboard
description: "A modern glassmorphism IoT dashboard for the Solar Soil project built with Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2
  
  # Dynamic Interactive Time-Series Charts
  fl_chart: ^0.66.0
  
  # Network & Real-Time Streams
  web_socket_channel: ^2.4.5
  http: ^1.2.1
  
  # Typography & Iconography
  google_fonts: ^6.1.0

  # Image Capturing & Uploading
  image_picker: ^1.1.2

  # Launch URLs on mobile (CSV export, etc.)
  url_launcher: ^6.2.6

  # Lottie animations
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/plant_loader.json
