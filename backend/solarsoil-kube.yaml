apiVersion: v1
kind: Pod
metadata:
  name: solarsoil-pod
spec:
  containers:
    # ----------------------------------------------------------
    # 1. InfluxDB Time-Series Database
    # ----------------------------------------------------------
    - name: solarsoil-influxdb
      image: docker.io/library/influxdb:2.7
      volumeMounts:
        - mountPath: /var/lib/influxdb2
          name: influxdb-data
        - mountPath: /etc/influxdb2
          name: influxdb-config
      env:
        - name: DOCKER_INFLUXDB_INIT_MODE
          value: "setup"
        - name: DOCKER_INFLUXDB_INIT_USERNAME
          value: "admin"
        - name: DOCKER_INFLUXDB_INIT_PASSWORD
          value: "adminpassword123"
        - name: DOCKER_INFLUXDB_INIT_ORG
          value: "college"
        - name: DOCKER_INFLUXDB_INIT_BUCKET
          value: "solarsoil"
        - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
          # Generate a secure 48-character token in production
          value: "solarsoil_secret_token_12345"

    # ----------------------------------------------------------
    # 2. Solar Soil Dashboard App (Node.js + Flutter Web)
    # ----------------------------------------------------------
    - name: solarsoil-app
      image: localhost/solarsoil-app:latest
      env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5000"
        - name: INFLUX_URL
          value: "http://localhost:8086"
        - name: INFLUX_TOKEN
          value: "solarsoil_secret_token_12345"
        - name: INFLUX_ORG
          value: "college"
        - name: INFLUX_BUCKET
          value: "solarsoil"
        - name: MQTT_BROKER
          value: "mqtt://broker.emqx.io:1883"
        - name: MQTT_TOPIC
          value: "solarsoil/nodeA"
      ports:
        - containerPort: 5000
          hostPort: 5000
          hostIP: 127.0.0.1

  # Persistent volumes declaration
  volumes:
    - name: influxdb-data
      hostPath:
        path: /var/lib/solarsoil/influxdb-data
        type: DirectoryOrCreate
    - name: influxdb-config
      hostPath:
        path: /etc/solarsoil/influxdb-config
        type: DirectoryOrCreate
